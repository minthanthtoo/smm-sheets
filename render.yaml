services:
  - type: web
    name: smm-sheets
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/db_init.py --db $SMM_DB && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SMM_DB
        value: /opt/render/project/data/app.db
      - key: SMM_EXPORT_ROOT
        value: /opt/render/project/data/exports
      - key: SMM_IMPORT_ROOT
        value: /opt/render/project/data/imports
      - key: PYTHON_VERSION
        value: 3.12.3
    disk:
      name: smm-data
      mountPath: /opt/render/project/data
      sizeGB: 1
