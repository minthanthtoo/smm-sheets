services:
  - type: web
    name: smm-sheets
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/db_init.py --db ${DATABASE_URL:-$SMM_DB} && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SMM_DB
        value: /tmp/app.db
      - key: SMM_EXPORT_ROOT
        value: /tmp/exports
      - key: SMM_IMPORT_ROOT
        value: /tmp/imports
      - key: PYTHON_VERSION
        value: 3.12.3
    # Free tier note: persistent disks are unavailable, so we default to /tmp (ephemeral).
