services:
  - type: web
    name: smm-sheets
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/db_init.py --db /var/data/app.db && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SMM_DB
        value: /var/data/app.db
      - key: SMM_EXPORT_ROOT
        value: /var/data/exports
      - key: SMM_IMPORT_ROOT
        value: /var/data/imports
      - key: PYTHON_VERSION
        value: 3.12.3
    disk:
      name: smm-data
      mountPath: /var/data
      sizeGB: 1
